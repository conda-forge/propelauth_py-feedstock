{% set name = "propelauth_py" %}
{% set version = "4.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8802fe9deba2bc4329201863a0f7533ad8b22e7ce46736b10101cfa5dab741c1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - httpx >=0.28.1
    - python >={{ python_min }}
    - pyjwt >=2,<3
    # upstream specifies pyjwt[crytpro]
    - cryptography >=3.4.0
    - requests

test:
  imports:
    - propelauth_py
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/propelauth/propelauth-py
  summary: A python authentication library
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
