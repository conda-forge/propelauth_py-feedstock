# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "4.4.0"

package:
  name: propelauth_py
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/propelauth-py/propelauth_py-${{ version }}.tar.gz
  sha256: 0767ff4765db9eeb71a4097f3e92a890e6cd53422fcfa813e0ed03a8e048b5b4

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - httpx >=0.28.1
    - pyjwt >=2.0,<3.0
    - requests

tests:
  - python:
      imports:
        - propelauth_py
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/propelauth/propelauth-py
  license: MIT
  license_file: LICENSE
  summary: A python authentication library
  description: |
    A python authentication library
  repository: https://github.com/propelauth/propelauth-py

extra:
  recipe-maintainers:
    - rxm7706
